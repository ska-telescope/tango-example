# GitLab CI in conjunction with GitLab Runner can use Docker Engine to test and build any application.
# Docker, when used with GitLab CI, runs each job in a separate and isolated container using the predefined image that is set up in .gitlab-ci.yml.
# In this case we use the latest python docker image to build and test this project.
image: nexus.engageska-portugal.pt/ska-docker/tango-builder:latest

# cache is used to specify a list of files and directories which should be cached between jobs. You can only use paths that are within the project workspace.
# If cache is defined outside the scope of jobs, it means it is set globally and all jobs will use that definition
cache:
  paths:
    - build

variables:
  # When using dind service, we need to instruct docker, to talk with
  # the daemon started inside of the service. The daemon is available
  # with a network connection instead of the default
  # /var/run/docker.sock socket. Docker 19.03 does this automatically
  # by setting the DOCKER_HOST in
  # https://github.com/docker-library/docker/blob/d45051476babc297257df490d22cbd806f1b11e4/19.03/docker-entrypoint.sh#L23-L29
  #
  # The 'docker' hostname is the alias of the service container as described at
  # https://docs.gitlab.com/ee/ci/docker/using_docker_images.html#accessing-the-services.
  #
  # Note that if you're using GitLab Runner 12.7 or earlier with the Kubernetes executor and Kubernetes 1.6 or earlier,
  # the variable must be set to tcp://localhost:2376 because of how the
  # Kubernetes executor connects services to the job container
  # DOCKER_HOST: tcp://localhost:2376
  #
  # Specify to Docker where to create the certificates, Docker will
  # create them automatically on boot, and will create
  # `/certs/client` that will be shared between the service and job
  # container, thanks to volume mount from config.toml
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://localhost:2375
  

services:
  - docker:19.03.11-dind

# before_script is used to define the command that should be run before all jobs, including deploy jobs, but after the restoration of artifacts.
# This can be an array or a multi-line string.
before_script:
  - docker login -u $DOCKER_REGISTRY_USERNAME -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY_HOST
  - docker version

# The YAML file defines a set of jobs with constraints stating when they should be run.
# You can specify an unlimited number of jobs which are defined as top-level elements with an arbitrary name and always have to contain at least the script clause.
# In this case we have only the test job which produce an artifacts (it must be placed into a directory called "public")
# It is also specified that only the master branch will be subject of this job.

stages:
  - build
  - lint
  - test
  - publish
  - pages

# *********************************************
## Docker Workflow

build: 
  stage: build
  tags:
    - auto-k8s
  script:
    - make build
  artifacts:
    when: always
    paths:
      - build

.lint:
  stage: lint
  tags:
    - auto-k8s
  script:
    - make lint
  allow_failure: true
  artifacts:
    when: always
    paths:
      - build

test:
  stage: test
  tags:
    - auto-k8s
  script:
    - make test
  artifacts:
    when: always
    paths:
      - build

publish:
  stage: publish
  tags:
    - auto-k8s
  script:
    - make build
    - make push

pages:
  stage: pages
  tags:
    - auto-k8s
  script:
   - ls -la
   - mkdir .public
   - cp build/coverage.xml .public
   - cp -r build/htmlcov/* .public
   - mv .public public
  when: always
  artifacts:
    paths:
      - public
    expire_in: 30 days

# *********************************************
## K8s Workflow

lint-check-chart:
  stage: lint
  tags:
    - minikube
  script:
    - make helm_dependencies
    - make chart_lint
  allow_failure: true
  artifacts:
    paths:
      - public

test-chart:
  stage: test
  variables: 
    KUBE_NAMESPACE: "tango-example"
  tags:
    - minikube
  before_script:
    - git clone https://gitlab.com/ska-telescope/skampi.git
    - cp -rf skampi/charts/tango-base charts/tango-base
    - rm -rf skampi
  script:
    - make build
    - make deploy_all
    - make smoketest
    - make k8s_test
  after_script:
    - make delete_all
  allow_failure: true
  artifacts:
    paths:
      - public

# *********************************************
create ci metrics:
  stage: .post
  when: always
  tags:
    - minikube
  script:
    # Gitlab CI badges creation: START
    - apt-get -y update
    - apt-get install -y curl --no-install-recommends
    - curl -s https://gitlab.com/ska-telescope/ci-metrics-utilities/raw/master/scripts/ci-badges-func.sh | sh
    # Gitlab CI badges creation: END
  allow_failure: true
  artifacts:
    paths:
      - ./build
