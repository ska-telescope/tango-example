# Default values for event-generator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

events_generator:
  replicaCount: 1
  enabled: true
  image:
    registry: nexus.engageska-portugal.pt/tango-example
    image: lmcbaseclasses
    tag: latest
    pullPolicy: IfNotPresent
  tangoDeviceName: "test/device/1"
  tangoHost: databaseds-tango-base-{{ .Release.Name }}:10000

resources:
  limits:
    cpu: 300m
    memory: 500Mi
  requests:
    cpu: 200m
    memory: 256Mi
